services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    restart: always 
    environment:
      - ORACLE_PASSWORD=password
      - ORACLE_DATABASE=XE
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "sqlplus -v"]
      interval: 10s
      timeout: 5s
      retries: 5

  owncloud:
    build: .
    container_name: owncloud
    restart: always 
    ports:
      - "8080:80"
    environment:
      - OWNCLOUD_DB_TYPE=oci
      - OWNCLOUD_DB_HOST=oracle-db:1521/XE
      - OWNCLOUD_DB_USERNAME=SYSTEM
      - OWNCLOUD_DB_PASSWORD=password
    depends_on:
      oracle-db:
        condition: service_healthy
    volumes:
      - owncloud_data:/mnt/data

volumes:
  oracle_data:
  owncloud_data: